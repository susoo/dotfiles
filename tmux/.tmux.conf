set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Keyboard
set -g mode-keys vi
setw -g mode-keys vi

# Theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_window_flags "icon"

# Bell monitoring (fires when Claude needs user action)
setw -g monitor-bell on
set -g visual-bell off
set -g status-justify absolute-centre
set -g status-left ""
set -g status-right "#[fg=#8bd5ca]#S #[fg=#a5adcb]%H:%M %d/%m"

# Better prefix (Ctrl-a instead of Ctrl-b, closer to screen muscle memory)
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# Better window split (override defaults to use current path)
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g automatic-rename off
set -g allow-rename off

# Active pane border highlight (Catppuccin plugin option)
set -g @catppuccin_pane_active_border_style 'fg=#a6da95'

# Split navigation (no wrap)
bind -n M-h if -F '#{pane_at_left}'   '' 'select-pane -L'
bind -n M-j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind -n M-k if -F '#{pane_at_top}'    '' 'select-pane -U'
bind -n M-l if -F '#{pane_at_right}'  '' 'select-pane -R'
bind -n M-q display-panes
set -g display-panes-time 3000

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-w kill-pane

# Show pane titles on the border
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

# Popups
bind -n M-y display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"
bind -n M-i display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "gh dash"
bind -n M-p display-popup \
  -w 80% \
  -h 80% \
  -E "lazydocker"

# Mouse support
set -g mouse on

run '~/.tmux/plugins/tpm/tpm'
